version: "3.8"

# WireGuard VPN - runs outside Swarm (requires cap_add)
# Start with: make wireguard-up
# Stop with: make wireguard-down

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy
    container_name: wg-easy
    hostname: wg-easy
    environment:
      - LANGUAGE=fr
      - WG_HOST=${WG_HOST}
      - WG_PORT=${WG_PORT:-51820}
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS:-1.1.1.1, 8.8.8.8}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS:-0.0.0.0/0}
      - WG_PERSISTENT_KEEPALIVE=${WG_PERSISTENT_KEEPALIVE:-25}
      - WG_POST_UP=iptables -t nat -A POSTROUTING -s 10.8.0.0/24 -j MASQUERADE; iptables -A INPUT -p udp -m udp --dport 51820 -j ACCEPT; iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT
      - WG_POST_DOWN=iptables -t nat -D POSTROUTING -s 10.8.0.0/24 -j MASQUERADE; iptables -D INPUT -p udp -m udp --dport 51820 -j ACCEPT; iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT
    volumes:
      - wg-easy_data:/etc/wireguard
    ports:
      - "${WG_PORT:-51820}:51820/udp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped
    networks:
      - traefik_traefik_proxy

  # DNS resolver for VPN clients: answers *.local.barlito.fr with the dev
  # machine's IP so the phone reaches the local Traefik through the tunnel,
  # and forwards everything else upstream. Clients use it via
  # WG_DEFAULT_DNS=10.8.0.1 (see .env.example).
  wg-dns:
    image: dockurr/dnsmasq
    container_name: wg-dns
    # Shares wg-easy's network namespace: dnsmasq listens directly on wg0
    # (10.8.0.1), no extra IP for clients to know.
    network_mode: service:wg-easy
    # The image's default entrypoint reads a config file; run dnsmasq with
    # flags instead.
    entrypoint:
      - dnsmasq
      - --keep-in-foreground
      - --log-facility=-
      - --no-resolv
      # Bind per-interface (wg0 appears after startup) without clashing with
      # Docker's embedded DNS on 127.0.0.11.
      - --bind-dynamic
      - --except-interface=lo
      # *.local.barlito.fr → where VPN clients can reach the local Traefik:
      # docker_gwbridge gateway by default (works on WSL and native Linux);
      # set WG_LOCAL_TARGET_IP to the machine's LAN IP to also serve LAN peers.
      - --address=/local.barlito.fr/${WG_LOCAL_TARGET_IP:-172.18.0.1}
      - --server=${WG_DNS_UPSTREAM:-1.1.1.1}
    depends_on:
      - wg-easy
    restart: unless-stopped

volumes:
  wg-easy_data:

networks:
  traefik_traefik_proxy:
    external: true
