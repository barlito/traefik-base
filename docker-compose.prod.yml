version: "3.8"

# Production override - uses Docker configs (no rsync needed!)

configs:
  traefik_static:
    file: ./traefik.prod.yml
  traefik_dynamic:
    file: ./traefik-dynamic.prod.yml

services:
  traefik:
    environment:
      - ENV=prod
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}
    deploy:
      labels:
        - traefik.http.routers.dashboard.middlewares=authentik-auth@file,security-headers@file
        - traefik.http.routers.dashboard.tls.certresolver=letsencrypt
    configs:
      - source: traefik_static
        target: /etc/traefik/traefik.yml
        mode: 0444
      - source: traefik_dynamic
        target: /etc/traefik/dynamic/config.yml
        mode: 0444
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-data:/etc/traefik

  authentik-server:
    deploy:
      labels:
        - traefik.http.routers.authentik.rule=Host(`auth.barlito.fr`)
        - traefik.http.routers.authentik.entrypoints=http
        - traefik.http.routers.authentik.middlewares=redirect-to-https@file
        - traefik.http.routers.authentik-secure.rule=Host(`auth.barlito.fr`)
        - traefik.http.routers.authentik-secure.entrypoints=https
        - traefik.http.routers.authentik-secure.tls=true
        - traefik.http.routers.authentik-secure.tls.certresolver=letsencrypt

volumes:
  traefik-data:
