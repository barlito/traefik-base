version: "3.8"

# Production override - uses Docker configs (no rsync needed!)

# Config names are suffixed with CONFIG_VERSION (a hash of the config files,
# computed in `make deploy-prod`). Any content change yields a new config
# object, so Swarm does a rolling update instead of failing with
# "only updates to Labels are allowed" (Docker configs are immutable).
configs:
  traefik_static:
    file: ./traefik.prod.yml
    name: traefik_static_${CONFIG_VERSION:-dev}
  traefik_dynamic:
    file: ./traefik-dynamic.prod.yml
    name: traefik_dynamic_${CONFIG_VERSION:-dev}
  authelia_config:
    file: ./authelia/configuration.prod.yml
    name: authelia_config_${CONFIG_VERSION:-dev}
  authelia_users:
    file: ./authelia/users.yml
    name: authelia_users_${CONFIG_VERSION:-dev}

services:
  traefik:
    environment:
      - ENV=prod
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}
    deploy:
      labels:
        - traefik.http.routers.dashboard.middlewares=authelia-auth@file,security-headers@file
        - traefik.http.routers.dashboard.tls.certresolver=letsencrypt
    configs:
      - source: traefik_static
        target: /etc/traefik/traefik.yml
        mode: 0444
      - source: traefik_dynamic
        target: /etc/traefik/dynamic/config.yml
        mode: 0444
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # Docker socket is no longer mounted here; Traefik reaches the Swarm API
      # via tcp://dockerproxy:2375 (see the dockerproxy service).
      - traefik-data:/etc/traefik

  authelia:
    configs:
      - source: authelia_config
        target: /config/configuration.yml
        mode: 0444
      - source: authelia_users
        target: /config/users.yml
        mode: 0444
    deploy:
      labels:
        - traefik.http.routers.authelia-secure.rule=Host(`auth.barlito.fr`)
        - traefik.http.routers.authelia-secure.entrypoints=https
        - traefik.http.routers.authelia-secure.tls=true
        - traefik.http.routers.authelia-secure.tls.certresolver=letsencrypt

volumes:
  traefik-data:
