api:
  dashboard: true
  insecure: false  # Disable insecure API access on port 8080

entryPoints:
  http:
    address: :80
    http2:
      maxConcurrentStreams: 250
  https:
    address: :443
    http2:
      maxConcurrentStreams: 250
    http3:
      advertisedPort: 444  # HTTP/3 on external 444/UDP (can't share 443 with TCP in Swarm); alt-svc advertises h3=":444"
  # Internal-only entrypoint for Prometheus metrics (not published to the host)
  metrics:
    address: :8082

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true

certificatesResolvers:
  letsencrypt:
    acme:
      # Email set via environment variable TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: http

global:
  sendAnonymousUsage: false

log:
  level: INFO  # Production log level

accessLog:
  # Write to a file (bind-mounted from the host, see docker-compose.prod.yml)
  # so the standalone fail2ban container can tail it. accessLog has a single
  # output, so this replaces stdout for ACCESS logs only — the app log still
  # goes to stdout for Alloy. To keep access logs in Loki, point Alloy at this
  # file (loki.source.file /var/log/traefik/access.log).
  filePath: /var/log/traefik/access.log
  format: json
  # No buffering: flush each line immediately so fail2ban reacts without delay.
  bufferingSize: 0
  filters:
    statusCodes:
      - "400-599"

providers:
  swarm:
    # Reach the Swarm API through the read-only docker-socket-proxy instead of
    # the raw socket (which is no longer mounted into this container).
    endpoint: tcp://dockerproxy:2375
    exposedByDefault: false
    watch: true
    network: traefik_traefik_proxy
  file:
    filename: /etc/traefik/dynamic/config.yml
    watch: true
