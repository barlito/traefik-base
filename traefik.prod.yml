api:
  dashboard: true
  insecure: false  # Disable insecure API access on port 8080

entryPoints:
  http:
    address: :80
    http2:
      maxConcurrentStreams: 250
  https:
    address: :443
    http2:
      maxConcurrentStreams: 250
    http3:
      advertisedPort: 444  # Announce HTTP/3 on external port 444 (<1024 for Chrome Alt-Svc)
  # Internal-only entrypoint for Prometheus metrics (not published to the host)
  metrics:
    address: :8082

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true

certificatesResolvers:
  letsencrypt:
    acme:
      # Email set via environment variable TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: http

global:
  sendAnonymousUsage: false

log:
  level: INFO  # Production log level

accessLog:
  # No filePath = stdout (for Docker logging driver to Loki/Fluentd)
  format: json
  bufferingSize: 100
  filters:
    statusCodes:
      - "400-599"

providers:
  swarm:
    # Reach the Swarm API through the read-only docker-socket-proxy instead of
    # the raw socket (which is no longer mounted into this container).
    endpoint: tcp://dockerproxy:2375
    exposedByDefault: false
    watch: true
    network: traefik_traefik_proxy
  file:
    filename: /etc/traefik/dynamic/config.yml
    watch: true
