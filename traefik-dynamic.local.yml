http:
  middlewares:
    # Redirect HTTP to HTTPS
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

    # Security Headers
    security-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        customResponseHeaders:
          X-Powered-By: ""
          Server: ""

    # No authentication for local development
    dashboard-auth:
      headers:
        customRequestHeaders:
          X-Local-Dev: "true"

    # VPN-only access — restrict to WireGuard subnet (apply to routers with: vpn-only@file)
    vpn-only:
      ipAllowList:
        sourceRange:
          - "10.8.0.0/24"

    # Authelia ForwardAuth — available for any service that needs auth protection
    authelia-auth:
      forwardAuth:
        address: http://authelia:9091/api/authz/forward-auth
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Name
          - Remote-Email

  routers:
    # WireGuard web UI (wg-easy runs outside Swarm, routed via file provider)
    wg-easy-secure:
      rule: "Host(`vpn.local.barlito.fr`)"
      entryPoints:
        - https
      service: wg-easy
      middlewares:
        - authelia-auth
        - security-headers
      tls: {}

    # Global HTTP to HTTPS redirect
    http-catchall:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - http
      middlewares:
        - redirect-to-https
      service: noop@internal
      priority: 1

  services:
    wg-easy:
      loadBalancer:
        servers:
          - url: "http://wg-easy:51821"

tls:
  certificates:
    - certFile: "/etc/certs/local-cert.pem"
      keyFile: "/etc/certs/local-key.pem"
