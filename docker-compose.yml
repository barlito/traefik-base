version: "3.8"

# Base configuration - common to all environments
# Use with: docker stack deploy -c docker-compose.yml -c docker-compose.{local|prod}.yml

services:
  traefik:
    image: traefik:3.6
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "444:443/udp"  # HTTP/3 on alternative port 444 (avoid TCP+UDP conflict, <1024 for Chrome Alt-Svc)
      - "8080:8080/tcp"
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-}
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.dashboard.rule=Host(`${DASHBOARD_HOST:-traefik.local.barlito.fr}`)
        - traefik.http.routers.dashboard.entrypoints=https
        - traefik.http.routers.dashboard.tls=true
        - traefik.http.routers.dashboard.service=api@internal
        - traefik.http.routers.dashboard.middlewares=security-headers@file
        - traefik.http.services.dummy-svc.loadbalancer.server.port=9999
    networks:
      - traefik_proxy

  authentik-server:
    image: ghcr.io/goauthentik/server:2025.12
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME: authentik
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.services.authentik.loadbalancer.server.port=9000
    networks:
      - traefik_proxy
      - authentik_internal

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.12
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_POSTGRESQL__NAME: authentik
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    networks:
      - authentik_internal

  authentik-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      POSTGRES_DB: authentik
    volumes:
      - authentik_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - authentik_internal

volumes:
  authentik_db_data:
  authentik_media:
  authentik_templates:

networks:
  traefik_proxy:
    driver: overlay
    attachable: true
  authentik_internal:
    driver: overlay

