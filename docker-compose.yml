version: "3.8"

# Base configuration - common to all environments
# Use with: docker stack deploy -c docker-compose.yml -c docker-compose.{local|prod}.yml

services:
  traefik:
    image: traefik:3.6
    # Publish in host mode (NOT the Swarm ingress mesh) for every environment.
    #
    # Why host mode: the ingress routing mesh SNATs every incoming connection to
    # the mesh IP (10.0.0.2), which hides the real client and breaks per-IP
    # defenses (fail2ban, rate limiting, geo-blocking). Host mode binds directly
    # on the node, preserving the source IP.
    #
    # Why HTTP/3 (UDP) stays on port 444, not 443: Docker Swarm deduplicates a
    # service's published ports by number and keeps only ONE entry when the same
    # PublishedPort appears for both TCP and UDP — and this happens even in host
    # mode (verified: publishing 443/tcp + 443/udp left ONLY 443/udp, killing
    # HTTPS). It is NOT an ingress-only limitation (moby/moby#43429). So TCP and
    # UDP must use different published ports; HTTP/3 is announced on 444 via
    # advertisedPort (see traefik.*.yml).
    #
    # Trade-off: no routing-mesh load balancing — the port binds only on the
    # node running Traefik. Fine: Traefik is pinned to a single manager replica.
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - target: 443
        published: 444
        protocol: udp
        mode: host  # HTTP/3 (QUIC) on external 444 — cannot share 443 with TCP (see above)
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-}
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.dashboard.rule=Host(`${DASHBOARD_HOST:-traefik.local.barlito.fr}`)
        - traefik.http.routers.dashboard.entrypoints=https
        - traefik.http.routers.dashboard.tls=true
        - traefik.http.routers.dashboard.service=api@internal
        - traefik.http.routers.dashboard.middlewares=security-headers@file
        - traefik.http.services.dummy-svc.loadbalancer.server.port=9999
    networks:
      - traefik_proxy

  # Read-only Docker/Swarm API proxy in front of the raw socket. Traefik's
  # Swarm provider talks to this over TCP (tcp://dockerproxy:2375) instead of
  # bind-mounting /var/run/docker.sock (a :ro socket mount does NOT restrict
  # the API). Only the read endpoints Traefik needs to discover routers are
  # whitelisted and every write is refused (POST=0). Pinned to a manager node
  # (the Swarm API requires a manager); it is the only service that touches
  # the real socket.
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    environment:
      # Endpoints Traefik's Swarm provider reads to build the routing table
      - SWARM=1        # /swarm
      - SERVICES=1     # /services (labels/routers live here)
      - TASKS=1        # /tasks (running replicas -> load-balancer targets)
      - NODES=1        # /nodes
      - NETWORKS=1     # /networks (resolve the provider network)
      - ENDPOINTS=1    # service virtual IPs
      - CONTAINERS=1   # container-level discovery
      - INFO=1         # /info (engine/swarm metadata)
      - EVENTS=1       # event stream to watch for changes
      - POST=0         # reject every write/mutating call
      - LOG_LEVEL=warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      placement:
        constraints:
          - node.role == manager
    networks:
      - traefik_proxy

  authelia:
    image: authelia/authelia:4
    environment:
      AUTHELIA_JWT_SECRET: ${AUTHELIA_JWT_SECRET}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
    volumes:
      - authelia_data:/data
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.services.authelia.loadbalancer.server.port=9091
    networks:
      - traefik_proxy

volumes:
  authelia_data:

networks:
  traefik_proxy:
    driver: overlay
    attachable: true

