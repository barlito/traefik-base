version: "3.8"

# WSL override - Uses host mode for port publishing to avoid issues with WSL2 networking

services:
  traefik:
    environment:
      - ENV=local
      # OVH API creds for the DNS-01 wildcard cert (*.local.barlito.fr).
      # Optional: without them Traefik falls back to the mkcert default cert.
      - OVH_ENDPOINT=${OVH_ENDPOINT:-ovh-eu}
      - OVH_APPLICATION_KEY=${OVH_APPLICATION_KEY:-}
      - OVH_APPLICATION_SECRET=${OVH_APPLICATION_SECRET:-}
      - OVH_CONSUMER_KEY=${OVH_CONSUMER_KEY:-}
    ports:
      # Use mode: host for WSL
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - target: 443
        published: 8443
        protocol: udp
        mode: host  # HTTP/3 on port 8443 (no conflict with 443/TCP)
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.local.yml:/etc/traefik/traefik.yml:ro
      - ./traefik-dynamic.local.yml:/etc/traefik/dynamic/config.yml:ro
      - ./certs:/etc/certs:ro
      - traefik-data:/etc/traefik

  authelia:
    volumes:
      - ./authelia/configuration.local.yml:/config/configuration.yml:ro
      - ./authelia/users.local.yml:/config/users.yml:ro
    deploy:
      labels:
        - traefik.http.routers.authelia-secure.rule=Host(`auth.local.barlito.fr`)
        - traefik.http.routers.authelia-secure.entrypoints=https
        - traefik.http.routers.authelia-secure.tls=true

volumes:
  traefik-data:
