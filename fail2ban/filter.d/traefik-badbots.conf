# fail2ban filter for Traefik's JSON access log.
#
# Matches any line where a client (ClientHost) got a 4xx client-error response.
# Traefik already filters its access log to 400-599; we target 4xx only (not
# 5xx) so our own server errors never ban a client. Rate limiting is the jail's
# job (maxretry/findtime), not here.
#
# Sample line (single JSON object, keys abbreviated):
#   {"ClientAddr":"1.2.3.4:5555","ClientHost":"1.2.3.4",...,
#    "DownstreamStatus":404,...,"RequestPath":"/.env",...,
#    "time":"2026-07-03T14:56:40Z"}
#
# Validate against a real log before trusting it:  make fail2ban-test

[Definition]

failregex = ^\s*\{.*?"ClientHost":"<HOST>".*?"DownstreamStatus":4\d\d.*$

ignoreregex =

# fail2ban needs a timestamp per line; anchor on the JSON "time" field.
datepattern = "time":"%%Y-%%m-%%dT%%H:%%M:%%SZ
