http:
  middlewares:
    # Redirect HTTP to HTTPS
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

    # Security Headers
    security-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        customResponseHeaders:
          X-Powered-By: ""
          Server: ""

    # VPN-only access — restrict to WireGuard subnet (apply to routers with: vpn-only@file)
    vpn-only:
      ipAllowList:
        sourceRange:
          - "10.8.0.0/24"

    # Authelia ForwardAuth — protects dashboard and other services without native auth
    authelia-auth:
      forwardAuth:
        address: http://authelia:9091/api/authz/forward-auth
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Name
          - Remote-Email

  routers:
    # WireGuard web UI (wg-easy runs outside Swarm, routed via file provider)
    wg-easy-secure:
      rule: "Host(`vpn.barlito.fr`)"
      entryPoints:
        - https
      service: wg-easy
      middlewares:
        - authelia-auth
        - security-headers
      tls:
        certResolver: letsencrypt

    # Global HTTP to HTTPS redirect
    http-catchall:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - http
      middlewares:
        - redirect-to-https
      service: noop@internal
      priority: 1

  services:
    wg-easy:
      loadBalancer:
        servers:
          - url: "http://wg-easy:51821"

tls:
  # Let's Encrypt certificates will be automatically managed
  # Local certificates can still be added here if needed
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
